<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <header class="flex items-center justify-between px-6 md:px-12 lg:px-20 py-6">

        <!-- LOGO -->
        <img src="src/images/Group 8.png" alt="logo" class="w-16 h-auto">
        <nav class="hidden md:flex items-center gap-10 text-[11px] tracking-[3px] uppercase mx-24">
            <a href="#" class="border-b border-black pb-1">Main</a>

            <a href="gallery.html">Gallery</a>
            <a href="projects.html">Projects</a>
            <a href="certifications.html">Certifications</a>
            <a href="contact.html">Contacts </a>
        </nav>

        <!-- Hamburger Menu -->
        <button class="md:hidden">
            <i class="fa-solid fa-bars text-black"></i>
        </button>

    </header>

    <section class="max-w-7xl mx-auto px-6 py-16">

    <!-- Container -->
    <div class="grid md:grid-cols-2 gap-12 items-center">

        <!-- Left Content -->
        <div>

            <!-- Heading -->
            <p class="text-4xl md:text-5xl font-light text-[#BDBDBD]">
                Contact
            </p>

            <h2 class="text-5xl md:text-6xl font-bold text-black mb-10">
                Information
            </h2>

            <!-- Company -->
            <div class="mb-8">

                <h3 class="font-semibold text-black mb-2">
                    Company Name
                </h3>

                <p class="text-sm text-gray-500">
                    1234 Sample Street Austin Texas 76401
                </p>

            </div>

            <!-- Phone -->
            <div class="mb-8">

                <h3 class="text-2xl font-bold text-black">
                    512.333.2222
                </h3>

            </div>

            <!-- Email -->
            <div class="mb-10">

                <p class="text-gray-500">
                    sampleemail@gmail.com
                </p>

            </div>

            <!-- Button -->
            <button
                class="
                bg-[#333333]
                text-white
                uppercase
                tracking-[3px]
                px-10
                py-5
                text-xs
                hover:opacity-90
                transition
                ">
                Contact Us
            </button>

        </div>

        <!-- Right Map -->
        <div>

            <img
                src="src/images/map-img.png"
                alt="Map"
                class="
                w-full
                h-[300px]
                md:h-[500px]
                object-cover
                ">

        </div>

    </div>

</section>
</html>
