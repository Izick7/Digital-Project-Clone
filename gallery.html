<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <header class="flex items-center justify-between px-6 md:px-12 lg:px-20 py-6">

        <!-- LOGO -->
        <img src="src/images/Group 8.png" alt="logo" class="w-16 h-auto">
        <nav class="hidden md:flex items-center gap-10 text-[11px] tracking-[3px] uppercase mx-24">
            <a href="#" class="border-b border-black pb-1">Main</a>

            <a href="gallery.html">Gallery</a>
            <a href="projects.html">Projects</a>
            <a href="certifications.html">Certifications</a>
            <a href="contact.html">Contacts </a>
        </nav>

        <!-- Hamburger Menu -->
        <button class="md:hidden">
            <i class="fa-solid fa-bars text-black"></i>
        </button>

    </header>

  <section class="max-w-7xl mx-auto px-6 py-16">

    <!-- Heading -->
    <p class="text-3xl md:text-4xl text-[#BDBDBD] font-light">
        Photo
    </p>

    <h2 class="text-4xl md:text-6xl font-bold text-black mb-12">
        Gallery
    </h2>

    <!-- Gallery Grid -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">

        <img src="src/images/galler-box.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic1.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic2.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic3.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic4.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic5.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic6.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic7.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic8.png"
            alt=""
            class="w-full aspect-square object-cover">

        <img src="src/images/gallery-pic9.png"
            alt=""
            class="w-full aspect-square object-cover">

    </div>

    <!-- Navigation -->
    <div class="flex items-center gap-6 mt-12">

        <button class="w-12 h-12 border flex items-center justify-center">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <button class="w-12 h-12 bg-[#F9F9F9] border flex items-center justify-center">
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <img
            src="src/images/slide-numbers.png"
            alt="slide numbers"
            class="w-24 md:w-32">
    </div>

</section>


<!-- FOOTER -->
    <footer class="bg-[#2C2C2C] text-white mt-20">

        <div class="flex flex-col md:flex-row items-start justify-between gap-10 px-6 md:px-12 lg:px-20 py-16">

            <!-- LOGO -->
            <div>
                <img src="src/images/footerlogo.png" alt="logo" class="w-24 h-auto">
            </div>

            <!-- INFORMATION -->
            <div class="flex flex-col gap-4">
                <h4 class="font-semibold mb-2">Information</h4>

                <a href="#">Main</a>
                <a href="#">Gallery</a>
                <a href="#">Projects</a>
                <a href="#">Certifications</a>
                <a href="#">Contacts</a>
            </div>

            <!-- CONTACTS -->
            <div class="flex flex-col gap-4 max-w-xs">

                <h4 class="font-semibold mb-2">
                    Contacts
                </h4>

                <div class="flex items-start gap-3">
                    <img src="src/images/Vector.png" alt="">
                    <p>1234 Sample Street<br>Austin Texas 78704</p>
                </div>

                <div class="flex items-center gap-3">
                    <img src="src/images/telephone.png" alt="">
                    <span>512.333.2222</span>
                </div>

                <div class="flex items-center gap-3">
                    <img src="src/images/email.png" alt="">
                    <span>sampleemail@gmail.com</span>
                </div>

            </div>

            <!-- SOCIAL -->
            <div class="flex flex-col gap-6">

                <h4 class="font-semibold">
                    Social Media
                </h4>

                <div class="flex gap-6">
                    <img src="src/images/facebook.png" alt="">
                    <img src="src/images/twitter.png" alt="">
                    <img src="src/images/Linked In.png" alt="">
                    <img src="src/images/pininterest.png" alt="">
                </div>

            </div>

        </div>

        <!-- COPYRIGHT -->
        <div class="border-t border-gray-700 py-4 text-center text-sm text-gray-400">

            © 2021 All Rights Reserved

        </div>

    </footer>


</body>

</html>
